# CD — runs when a PR is merged into main
# Builds a Docker image of the FastAPI backend,
# pushes it to Amazon ECR, and restarts the running service.
#
# Prerequisites (set these in GitHub → Settings → Secrets and variables → Actions):
#   AWS_ACCESS_KEY_ID
#   AWS_SECRET_ACCESS_KEY
#   AWS_REGION             (e.g. us-east-1)
#   ECR_REPOSITORY         (e.g. resume-coach-backend)
#   EC2_HOST               (public IP or DNS of your EC2 instance)
#   EC2_SSH_KEY            (private key for SSH, paste the full PEM contents)

name: Deploy to AWS

on:
  push:
    branches: [main]      # triggers only when code lands on main
  workflow_dispatch:       # also allows manual trigger from GitHub UI

env:
  IMAGE_TAG: ${{ github.sha }}   # each deploy is tagged with its commit SHA

jobs:
  build-and-push:
    name: Build & Push Docker image to ECR
    runs-on: ubuntu-latest

    outputs:
      image_uri: ${{ steps.build.outputs.image_uri }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Authenticate to AWS using repository secrets
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # Log in to Amazon ECR (the AWS Docker registry)
      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Build the Docker image and push it to ECR
      - name: Build, tag, and push image
        id: build
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
        run: |
          IMAGE_URI="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker build -t "$IMAGE_URI" .
          docker push "$IMAGE_URI"
          # Also tag as 'latest' for convenience
          docker tag "$IMAGE_URI" "$ECR_REGISTRY/$ECR_REPOSITORY:latest"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:latest"
          echo "image_uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"

  deploy-to-ec2:
    name: Deploy new image on EC2
    runs-on: ubuntu-latest
    needs: build-and-push     # only runs after image is successfully pushed

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # SSH into EC2 and pull + restart the container
      - name: Pull and restart container on EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          IMAGE_URI: ${{ needs.build-and-push.outputs.image_uri }}
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          # Write the SSH key from the secret to a temp file
          echo "${{ secrets.EC2_SSH_KEY }}" > /tmp/deploy_key.pem
          chmod 600 /tmp/deploy_key.pem

          ssh -o StrictHostKeyChecking=no -i /tmp/deploy_key.pem ec2-user@$EC2_HOST << EOF
            # Authenticate Docker on EC2 to pull from ECR
            aws ecr get-login-password --region $AWS_REGION \
              | docker login --username AWS --password-stdin $ECR_REGISTRY

            # Pull the new image
            docker pull $IMAGE_URI

            # Stop and remove the old container (if running)
            docker stop resume-coach-api || true
            docker rm   resume-coach-api || true

            # Start the new container
            docker run -d \
              --name resume-coach-api \
              --restart unless-stopped \
              -p 8000:8000 \
              --env-file /home/ec2-user/resume-coach/.env \
              $IMAGE_URI

            # Quick health check
            sleep 5
            curl -sf http://localhost:8000/health && echo "Deploy OK" || echo "Health check FAILED"
          EOF

          rm /tmp/deploy_key.pem
