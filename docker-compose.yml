# Local development — spins up the API and the Streamlit frontend together.
# Usage:  docker-compose up
#
# Requires a .env file in the project root with at least:
#   SAGEMAKER_ENDPOINT_NAME=resume-coach-endpoint
#   AWS_REGION=us-east-1
#   AWS_ACCESS_KEY_ID=...
#   AWS_SECRET_ACCESS_KEY=...

version: "3.9"

services:
  api:
    build: .
    container_name: resume-coach-api
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      # Mount prompts so you can edit them without rebuilding the image
      - ./prompts:/app/prompts:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  frontend:
    image: python:3.11-slim
    container_name: resume-coach-frontend
    working_dir: /app
    command: >
      sh -c "pip install -q streamlit PyPDF2 requests &&
             streamlit run frontend/app_v2.py --server.port 8501 --server.address 0.0.0.0"
    ports:
      - "8501:8501"
    volumes:
      - .:/app:ro
    environment:
      - BACKEND_API_URL=http://api:8000   # uses Docker's internal DNS, not localhost
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
